<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8d3e8"/>
      <stop offset="100%" style="stop-color:#b8c6df"/>
    </linearGradient>
    <linearGradient id="activeTab" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a65f5"/>
      <stop offset="100%" style="stop-color:#3d82f7"/>
    </linearGradient>
    <filter id="tabGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="windowShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7a90b8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Icon background — medium blue-gray, not white, so the window pops -->
  <rect width="128" height="128" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Browser window — crisp white for contrast against bg -->
  <rect x="12" y="16" width="104" height="96" rx="9" ry="9" fill="#ffffff" filter="url(#windowShadow)"/>

  <!-- Title bar — noticeably darker than window -->
  <rect x="12" y="16" width="104" height="20" rx="9" ry="9" fill="#dde4f0"/>
  <rect x="12" y="28" width="104" height="8" fill="#dde4f0"/>

  <!-- URL bar -->
  <rect x="26" y="20" width="76" height="11" rx="5" fill="#c8d2e6"/>
  <rect x="32" y="23" width="36" height="5" rx="2.5" fill="#a8b8d0" opacity="0.9"/>

  <!-- Sidebar — distinctly darker than content area -->
  <rect x="12" y="36" width="34" height="76" fill="#e2e8f4"/>
  <path d="M12 104 Q12 112 21 112 L12 112 Z" fill="#e2e8f4"/>

  <!-- Divider — more visible -->
  <line x1="46" y1="36" x2="46" y2="112" stroke="#b0bcda" stroke-width="1.5"/>

  <!-- Active tab — highlight row + left accent -->
  <rect x="12" y="42" width="34" height="12" fill="#dce6ff"/>
  <rect x="12" y="42" width="4" height="12" fill="url(#activeTab)" filter="url(#tabGlow)"/>
  <rect x="20" y="46" width="20" height="3" rx="1.5" fill="#1a65f5" opacity="0.9"/>

  <!-- Tab 2 -->
  <rect x="20" y="62" width="17" height="3" rx="1.5" fill="#6878a8" opacity="0.85"/>

  <!-- Tab 3 -->
  <rect x="20" y="75" width="21" height="3" rx="1.5" fill="#6878a8" opacity="0.75"/>

  <!-- Tab 4 -->
  <rect x="20" y="88" width="13" height="3" rx="1.5" fill="#6878a8" opacity="0.65"/>

  <!-- Tab 5 -->
  <rect x="20" y="101" width="18" height="3" rx="1.5" fill="#6878a8" opacity="0.5"/>

  <!-- Content area lines — darker than before for legibility -->
  <rect x="54" y="42" width="50" height="5" rx="2.5" fill="#8898c0" opacity="0.7"/>
  <rect x="54" y="53" width="38" height="3" rx="1.5" fill="#9aaac8" opacity="0.65"/>
  <rect x="54" y="60" width="46" height="3" rx="1.5" fill="#9aaac8" opacity="0.55"/>
  <rect x="54" y="67" width="32" height="3" rx="1.5" fill="#9aaac8" opacity="0.45"/>
  <rect x="54" y="78" width="50" height="3" rx="1.5" fill="#9aaac8" opacity="0.4"/>
  <rect x="54" y="85" width="36" height="3" rx="1.5" fill="#9aaac8" opacity="0.35"/>
  <rect x="54" y="92" width="42" height="3" rx="1.5" fill="#9aaac8" opacity="0.28"/>
  <rect x="54" y="99" width="28" height="3" rx="1.5" fill="#9aaac8" opacity="0.2"/>
</svg>
