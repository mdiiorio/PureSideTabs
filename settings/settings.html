<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PureSideTabs Settings</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="settings.css" />
</head>
<body>
    <div class="settings-page">
        <h1>PureSideTabs Settings</h1>

        <div class="setting-row">
            <label for="mru-limit">Recent tabs to show in popup</label>
            <input type="number" id="mru-limit" min="1" max="10" />
        </div>

        <div class="setting-row">
            <label for="new-tab-in-group">Open new tabs inside current group</label>
            <input type="checkbox" id="new-tab-in-group" />
        </div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
